<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Airtel Moments Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070707;
      --panel: #141414;
      --panel-2: #1d1d1d;
      --line: #333;
      --muted: #9a9a9a;
      --text: #f5f5f5;
      --red: #ed0000;
      --green: #15ad55;
      --stage-w: 390px;
      --stage-h: 893px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 10%, rgba(237, 0, 0, 0.16), transparent 28rem),
        radial-gradient(circle at 80% 90%, rgba(46, 140, 150, 0.15), transparent 24rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    .prototype {
      width: min(1180px, 100vw);
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 24px;
      align-items: center;
      padding: 28px;
    }

    .stage-wrap {
      display: grid;
      place-items: center;
      gap: 14px;
      min-width: 0;
    }

    .screen {
      position: relative;
      width: var(--stage-w);
      height: var(--stage-h);
      border-radius: 34px;
      background: #000;
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.78),
        0 0 0 1px rgba(255, 255, 255, 0.08);
      overflow: hidden;
      transform-origin: center;
      transition: width 180ms ease, height 180ms ease, border-radius 180ms ease;
    }

    .screen-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      user-select: none;
      pointer-events: none;
      background: #000;
    }

    .hotspot {
      position: absolute;
      z-index: 5;
      padding: 0;
      border: 0;
      border-radius: 18px;
      background: rgba(237, 0, 0, 0);
      cursor: pointer;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
    }

    .hotspot:hover {
      outline: none;
      background: transparent;
    }

    .hotspot:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.38);
      outline-offset: 2px;
      background: rgba(255, 255, 255, 0.04);
    }

    .tap-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .tap-layer:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.38);
      outline-offset: -6px;
    }

    .selection-ring {
      position: absolute;
      z-index: 3;
      border-radius: 999px;
      border: 2px solid var(--red);
      box-shadow: 0 0 22px rgba(237, 0, 0, 0.55);
      pointer-events: none;
    }

    .selection-check {
      position: absolute;
      right: -5px;
      bottom: -5px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--red);
    }

    .selection-check::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 6px;
      width: 8px;
      height: 14px;
      border: solid #fff;
      border-width: 0 3px 3px 0;
      transform: rotate(45deg);
    }

    .selection-fill {
      position: absolute;
      z-index: 2;
      border-radius: 18px;
      border: 2px solid rgba(237, 0, 0, 0.9);
      background: rgba(237, 0, 0, 0.18);
      box-shadow: inset 0 0 0 999px rgba(237, 0, 0, 0.02);
      pointer-events: none;
    }

    .avatar-selection-ring {
      position: absolute;
      z-index: 3;
      border: 2px solid var(--red);
      border-radius: 999px;
      box-shadow: 0 0 16px rgba(237, 0, 0, 0.42);
      pointer-events: none;
    }

    .avatar-selection-check {
      position: absolute;
      z-index: 4;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 4px 14px rgba(237, 0, 0, 0.45);
      pointer-events: none;
    }

    .avatar-selection-check::after {
      content: "";
      position: absolute;
      left: 36%;
      top: 22%;
      width: 24%;
      height: 44%;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .pill-selection,
    .tile-selection {
      position: absolute;
      z-index: 3;
      border: 2px solid var(--red);
      box-shadow: 0 0 14px rgba(237, 0, 0, 0.26);
      pointer-events: none;
    }

    .pill-selection {
      border-radius: 999px;
      background: rgba(237, 0, 0, 0.1);
    }

    .tile-selection {
      border-radius: 14px;
      background: rgba(237, 0, 0, 0.05);
    }

    .pill-selection-check,
    .tile-selection-check {
      position: absolute;
      z-index: 4;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 4px 14px rgba(237, 0, 0, 0.42);
      pointer-events: none;
    }

    .pill-selection-check::after,
    .tile-selection-check::after {
      content: "";
      position: absolute;
      left: 36%;
      top: 22%;
      width: 24%;
      height: 44%;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .toast {
      position: absolute;
      z-index: 10;
      left: 7%;
      right: 7%;
      bottom: 6%;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(28, 28, 28, 0.94);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 15px;
      line-height: 1.3;
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast[data-show="true"] {
      opacity: 1;
      transform: translateY(0);
    }

    .toast[hidden] {
      display: none;
    }

    .toast-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: inset 0 0 0 5px rgba(0, 0, 0, 0.25);
      flex: 0 0 auto;
    }

    .side-panel {
      align-self: center;
      max-height: calc(100vh - 56px);
      overflow: auto;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(24, 24, 24, 0.95), rgba(16, 16, 16, 0.95));
      box-shadow: 0 16px 60px rgba(0, 0, 0, 0.32);
    }

    .viewport-caption {
      width: min(var(--stage-w), 520px);
      min-height: 86px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(16, 16, 16, 0.88);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.36);
      color: #e9e9e9;
    }

    .viewport-caption-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.2;
    }

    .viewport-caption-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(237, 0, 0, 0.16);
      color: #ff7272;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .viewport-caption-body {
      margin: 0;
      color: #bdbdbd;
      font-size: 12px;
      line-height: 1.45;
    }

    .brand {
      margin: 0 0 4px;
      color: var(--red);
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
    }

    .caption {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .nav-label {
      display: block;
      margin: 14px 0 8px;
      color: #bdbdbd;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .phase-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin: 8px 0 14px;
    }

    .phase-tab {
      min-height: 34px;
      padding: 8px 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: #dcdcdc;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }

    .phase-tab[aria-selected="true"] {
      border-color: rgba(237, 0, 0, 0.75);
      background: rgba(237, 0, 0, 0.2);
      color: #fff;
    }

    .phase-tab:hover,
    .phase-tab:focus-visible {
      outline: 2px solid rgba(237, 0, 0, 0.7);
      outline-offset: 2px;
    }

    .nav-grid {
      display: grid;
      gap: 8px;
    }

    .nav-button {
      min-height: 38px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: #e8e8e8;
      font: inherit;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }

    .nav-button[aria-current="true"] {
      border-color: rgba(237, 0, 0, 0.75);
      background: rgba(237, 0, 0, 0.18);
      color: #fff;
    }

    .nav-button:focus-visible,
    .nav-button:hover {
      outline: 2px solid rgba(237, 0, 0, 0.75);
      outline-offset: 2px;
    }

    .status-card {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      color: #d4d4d4;
      font-size: 12px;
      line-height: 1.45;
    }

    .status-card strong {
      color: #fff;
      font-weight: 650;
    }

    .status-card .phase {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      margin: 0 0 9px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(237, 0, 0, 0.16);
      color: #ff6b6b;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .context-list {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      color: #bdbdbd;
    }

    .context-list li + li {
      margin-top: 6px;
    }

    @media (max-width: 820px) {
      body {
        display: block;
      }

      .prototype {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 12px;
        min-height: 100vh;
      }

      .side-panel {
        order: -1;
        padding: 12px;
        max-height: 190px;
      }

      .brand,
      .caption {
        display: none;
      }

      .nav-label {
        margin-top: 0;
      }

      .nav-grid {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .nav-button {
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .phase-tabs {
        display: flex;
        overflow-x: auto;
      }

      .phase-tab {
        flex: 0 0 auto;
        min-width: 92px;
      }

      .status-card {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="prototype">
    <section class="stage-wrap" aria-label="Phone prototype">
      <div class="screen" id="screen">
        <img class="screen-image" id="screenImage" src="assets/home.png" alt="">
        <div id="hotspots"></div>
        <div id="selectionLayer"></div>
        <div class="toast" id="toast" role="status" aria-live="polite" hidden>
          <span class="toast-dot" aria-hidden="true"></span>
          <span id="toastText">Saved</span>
        </div>
      </div>
      <div class="viewport-caption" id="viewportCaption" aria-live="polite"></div>
    </section>

    <aside class="side-panel" aria-label="Prototype controls">
      <h1 class="brand">Xstream Moments</h1>
      <p class="caption">Clickable phone prototype built from the exported Figma screens and PRD journey.</p>
      <div class="phase-tabs" id="phaseTabs" role="tablist" aria-label="Prototype phase"></div>
      <span class="nav-label">Jump To State</span>
      <div class="nav-grid" id="nav"></div>
      <div class="status-card" id="statusCard"></div>
    </aside>
  </main>

        asset: "assets/iter2-match-timeline.png",
        size: [2988, 9600],
        phase: "Iteration 2 sports",
        caption: "Sports Catch Up to Live uses match events and score context to bridge highlights to live/replay.",
        status: "Match Moments timeline for sports catch-up and live handoff.",
        significance: [
          "Late-joining users get a 60-second key-moment pack before jumping live.",
          "Completed matches can become browsable moment timelines."
        ],
        hotspots: [
          { id: "iter2-match-live", label: "Watch live from timeline", box: [10, 26, 80, 8], action: ["go", "sportsLive"] },
          { id: "iter2-match-event", label: "Open match moment event", box: [8, 50, 84, 12], action: ["go", "sportsLive"] }
        ]
      },
      iter2ThirdPartyRatings: {
        label: "Licensed ratings",
        asset: "assets/iter2-third-party-ratings.png",
        size: [3045, 6903],
        phase: "Iteration 2 confidence",
        caption: "Licensed third-party ratings can improve confidence for undecided users when legally available.",
        status: "Player/detail state with licensed rating confidence signals.",
        significance: [
          "The PRD recommends Airtel-owned signals first, then external ratings only after licensing is confirmed.",
          "Ratings should support decisions without creating legal or trust risk."
        ],
        hotspots: [
          { id: "iter2-ratings-watch", label: "Watch Full with ratings", box: [8, 86, 84, 7], action: ["go", "bestway"] },
          { id: "iter2-ratings-share", label: "Share rated title", box: [82, 78, 14, 8], action: ["toast", "Rated title share ready"] }
        ]
      }
    };

    const phaseGroups = {
      mvp: {
        label: "MVP",
        first: "home",
        states: [
          "home",
          "language",
          "genre",
          "follow",
          "feed",
          "immersive",
          "saved",
          "bestway",
          "more",
          "detail",
          "recap",
          "smart",
          "momentsTab",
          "sportsLive",
          "lowNetwork",
          "widePrompt",
          "wideSwitch",
          "wideView"
        ]
      },
      iter1: {
        label: "Iteration 1",
        first: "iter1BottomTab",
        states: [
          "iter1BottomTab",
          "iter1PersonalizedPack",
          "iter1AiCaption",
          "iter1Scrubber",
          "iter1TuneFeed",
          "iter1RecapNotification",
          "iter1RecapWidget",
          "iter1Preferences",
          "iter1ContinueTv"
        ]
      },
      iter2: {
        label: "Iteration 2",
        first: "iter2DecisionIntelligence",
        states: [
          "iter2DecisionIntelligence",
          "iter2DecisionPacks",
          "iter2AiVoiceover",
          "iter2MatchTimeline",
          "iter2ThirdPartyRatings"
        ]
      }
    };

    const phaseOrder = ["mvp", "iter1", "iter2"];
    const jumpOrder = phaseOrder.flatMap((phase) => phaseGroups[phase].states);
    const selected = new Set(["genre-action", "genre-scifi", "follow-salman"]);
    let current = "home";
    let currentPhase = "mvp";
    let toastTimer = 0;
    let immersiveTimer = 0;
    let stateTimer = 0;

    for (const screen of Object.values(screens)) {
      const img = new Image();
      img.src = screen.asset;
    }

    const screenEl = document.getElementById("screen");
    const imageEl = document.getElementById("screenImage");
    const hotspotsEl = document.getElementById("hotspots");
    const selectionLayer = document.getElementById("selectionLayer");
    const toastEl = document.getElementById("toast");
    const toastText = document.getElementById("toastText");
    const navEl = document.getElementById("nav");
    const phaseTabsEl = document.getElementById("phaseTabs");
    const statusCard = document.getElementById("statusCard");
    const viewportCaption = document.getElementById("viewportCaption");
    const stageWrap = document.querySelector(".stage-wrap");

    function boxStyle(box) {
      return `left:${box[0]}%;top:${box[1]}%;width:${box[2]}%;height:${box[3]}%;`;
    }

    function phaseForKey(key) {
      return phaseOrder.find((phase) => phaseGroups[phase].states.includes(key)) || "mvp";
    }

    function activeOrder() {
      return phaseGroups[currentPhase].states;
    }

    function renderPhaseTabs() {
      phaseTabsEl.innerHTML = "";
      for (const phase of phaseOrder) {
        const button = document.createElement("button");
        button.className = "phase-tab";
        button.type = "button";
        button.role = "tab";
        button.textContent = phaseGroups[phase].label;
        button.setAttribute("aria-selected", phase === currentPhase ? "true" : "false");
        button.addEventListener("click", () => {
          currentPhase = phase;
          go(phaseGroups[phase].first);
        });
        phaseTabsEl.appendChild(button);
      }
    }

    function renderNav() {
      navEl.innerHTML = "";
      for (const key of activeOrder()) {
        const button = document.createElement("button");
        button.className = "nav-button";
        button.type = "button";
        button.textContent = screens[key].label;
        button.setAttribute("aria-current", key === current ? "true" : "false");
        button.addEventListener("click", () => go(key));
        navEl.appendChild(button);
      }
    }

    function resizeStage() {
      const screen = screens[current];
      const [naturalW, naturalH] = screen.size;
      const maxH = Math.min(window.innerHeight - (window.innerWidth <= 820 ? 116 : 56), 930);
      const sideGap = window.innerWidth <= 820 ? 24 : 340;
      const availableStageWidth = stageWrap?.clientWidth || (window.innerWidth - sideGap);
      const maxW = Math.max(260, availableStageWidth - 8);
      const scale = Math.min(maxW / naturalW, maxH / naturalH, 1 / 3);
      screenEl.style.setProperty("--stage-w", `${Math.round(naturalW * scale)}px`);
      screenEl.style.setProperty("--stage-h", `${Math.round(naturalH * scale)}px`);
      screenEl.style.borderRadius = `${Math.max(18, Math.round(34 * scale * 3))}px`;
    }

    function showToast(message, timeout = 1500) {
      window.clearTimeout(toastTimer);
      toastText.textContent = message;
      toastEl.hidden = false;
      toastEl.dataset.show = "true";
      toastTimer = window.setTimeout(() => {
        hideToast();
      }, timeout);
    }

    function hideToast() {
      window.clearTimeout(toastTimer);
      toastEl.dataset.show = "false";
      toastEl.hidden = true;
    }

    function clearImmersiveTimer() {
      window.clearTimeout(immersiveTimer);
      immersiveTimer = 0;
    }

    function clearStateTimer() {
      window.clearTimeout(stateTimer);
      stateTimer = 0;
    }

    function scheduleImmersive() {
      clearImmersiveTimer();
      if (current !== "feed") return;
      immersiveTimer = window.setTimeout(() => {
        if (current === "feed") go("immersive", { quiet: true });
      }, 4200);
    }

    function handleAction(action, event) {
      if (event) event.stopPropagation();
      const [type, arg, message] = action;
      if (type === "go") {
        go(arg);
        return;
      }
      if (type === "toast") {
        showToast(arg);
        scheduleImmersive();
        return;
      }
      if (type === "toggle") {
        if (selected.has(arg)) {
          selected.delete(arg);
          showToast(message.replace("selected", "removed").replace("Following", "Unfollowed"));
        } else {
          selected.add(arg);
          showToast(message);
        }
        renderSelections();
        return;
      }
      if (type === "feedback") {
        showToast(arg);
        window.setTimeout(() => go("feed", { quiet: true }), 650);
        return;
      }
      if (type === "activatePlan") {
        showToast("SonyLIV add-on selected. Returning to player.", 1200);
        window.setTimeout(() => go("feed", { quiet: true }), 1250);
        return;
      }
      if (type === "undoSave") {
        showToast("Removed from Watchlist", 1000);
        window.setTimeout(() => go("feed", { quiet: true }), 800);
      }
    }

    function renderHotspots() {
      hotspotsEl.innerHTML = "";
      const screen = screens[current];

      if (screen.tapAction) {
        const tapLayer = document.createElement("button");
        tapLayer.className = "tap-layer";
        tapLayer.type = "button";
        tapLayer.setAttribute("aria-label", current === "immersive" ? "Reveal player controls" : "Hide player controls");
        tapLayer.addEventListener("click", (event) => handleAction(screen.tapAction, event));
        hotspotsEl.appendChild(tapLayer);
      }

      for (const spot of screen.hotspots) {
        const button = document.createElement("button");
        button.className = "hotspot";
        button.type = "button";
        button.id = spot.id;
        button.style.cssText = boxStyle(spot.box);
        button.setAttribute("aria-label", spot.label);
        button.title = spot.label;
        button.addEventListener("click", (event) => handleAction(spot.action, event));
        hotspotsEl.appendChild(button);
      }
    }

    function renderSelections() {
      selectionLayer.innerHTML = "";
      const screen = screens[current];
      for (const spot of screen.hotspots) {
        if (!spot.marker || !selected.has(spot.id) || spot.nativeSelected) continue;

        if (spot.marker === "avatar" && spot.ringBox) {
          const ring = document.createElement("div");
          ring.className = "avatar-selection-ring";
          ring.style.cssText = boxStyle(spot.ringBox);
          selectionLayer.appendChild(ring);
        }

        if ((spot.marker === "pill" || spot.marker === "tile") && spot.selectBox) {
          const selectedShape = document.createElement("div");
          selectedShape.className = spot.marker === "pill" ? "pill-selection" : "tile-selection";
          selectedShape.style.cssText = boxStyle(spot.selectBox);
          selectionLayer.appendChild(selectedShape);
        }

        if (spot.checkBox) {
          const check = document.createElement("div");
          if (spot.marker === "avatar") check.className = "avatar-selection-check";
          if (spot.marker === "pill") check.className = "pill-selection-check";
          if (spot.marker === "tile") check.className = "tile-selection-check";
          check.style.cssText = boxStyle(spot.checkBox);
          selectionLayer.appendChild(check);
        }
      }
    }

    function go(key, options = {}) {
      current = key;
      currentPhase = phaseForKey(key);
      clearImmersiveTimer();
      clearStateTimer();
      hideToast();
      const screen = screens[current];
      imageEl.src = screen.asset;
      imageEl.alt = `${screen.label} screen`;
      const significanceItems = screen.significance
        .map((item) => `<li>${item}</li>`)
        .join("");
      statusCard.innerHTML = `
        <span class="phase">${screen.phase}</span><br>
        <strong>${screen.label}</strong><br>
        ${screen.status}
        <ul class="context-list">${significanceItems}</ul>
      `;
      viewportCaption.innerHTML = `
        <div class="viewport-caption-title">
          <span class="viewport-caption-kicker">${phaseGroups[currentPhase].label}</span>
          <span>${screen.label}</span>
        </div>
        <p class="viewport-caption-body">${screen.caption || screen.status}</p>
      `;
      resizeStage();
      renderPhaseTabs();
      renderNav();
      renderHotspots();
      renderSelections();
      if (!options.quiet && current === "saved") showToast("Added to Watchlist");
      if (!options.quiet && current === "immersive") showToast("Controls hidden. Tap to reveal.", 1000);
      if (current === "feed") scheduleImmersive();
      if (current === "wideSwitch") {
        stateTimer = window.setTimeout(() => go("wideView", { quiet: true }), 950);
      }
    }

    window.addEventListener("resize", resizeStage);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        go(current === "home" ? "home" : "feed");
      }
      if (event.key === "ArrowRight") {
        const order = activeOrder();
        const nextIndex = Math.min(order.indexOf(current) + 1, order.length - 1);
        go(order[nextIndex]);
      }
      if (event.key === "ArrowLeft") {
        const order = activeOrder();
        const prevIndex = Math.max(order.indexOf(current) - 1, 0);
        go(order[prevIndex]);
      }
    });

    go("home", { quiet: true });
  </script>
</body>
</html>
